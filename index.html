<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Trinity Church Sutton — Service Sheet</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>

    <header>Trinity Church Sutton &middot; Service Sheet Flipbook</header>

    <div class="viewer-wrap">
        <div class="viewer-row">
            <div class="page-frame right-page" id="pageFrame">
                <div class="stage">
                    <canvas class="leaf-base" id="leafBaseCanvas" aria-label="Service sheet page"></canvas>
                    <div class="leaf-flip" id="leafFlip">
                        <canvas id="leafFlipCanvas" aria-hidden="true"></canvas>
                    </div>
                </div>
            </div>

            <div class="arrows-row">
                <div class="arrow-wrap">
                    <button class="arrow-btn" id="btnBack" type="button" aria-label="Previous page" disabled>
                        <svg viewBox="0 0 24 24">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z" />
                        </svg>
                    </button>
                    <span class="arrow-label">&#9664; Back</span>
                </div>

                <div class="arrow-wrap">
                    <button class="arrow-btn" id="btnFwd" type="button" aria-label="Next page" disabled>
                        <svg viewBox="0 0 24 24">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z" />
                        </svg>
                    </button>
                    <span class="arrow-label">Forward &#9654;</span>
                </div>
            </div>
        </div>

        <div class="indicator">
            <div class="page-label" id="pageLabel">Loading Wsheet.pdf&hellip;</div>
            <div class="pips" id="pipsRow"></div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="hint">Tap dots &middot; swipe &middot; or press &#8592; &#8594; keys</div>
        </div>
    </div>

    <script type="module" src="./app.js"></script>
</body>

</html>
